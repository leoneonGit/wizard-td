<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#14121f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Wildguard TD</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/portrait_fire.png" />
    <script type="module" crossorigin src="./assets/main-BdtN9Gv7.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/mapio-ClxqmgMH.js">
    <link rel="stylesheet" crossorigin href="./assets/mapio-DHzM8Bgr.css">
  </head>
  <body>
    <div id="app">
      <div id="board-wrap">
        <canvas id="board" width="960" height="640"></canvas>
        <div id="tower-panel" class="hidden"></div>
        <div id="draft-modal" class="hidden"></div>
        <div id="specialize-modal" class="hidden"></div>
        <div id="relic-modal" class="hidden"></div>
        <div id="event-modal" class="hidden"></div>
        <div id="path-modal" class="hidden"></div>
        <div id="actclear-modal" class="hidden"></div>
        <div id="zoom-controls">
          <button id="zoom-in" title="Zoom in">＋</button>
          <button id="zoom-out" title="Zoom out">－</button>
          <button id="zoom-reset" title="Reset view">⛶</button>
        </div>
        <div id="place-confirm" class="hidden">
          <button id="pc-build">✓ Build</button>
          <button id="pc-cancel">✕</button>
        </div>
        <div id="overlay" class="hidden">
          <div id="overlay-card">
            <h2 id="overlay-title"></h2>
            <p id="overlay-text"></p>
            <button id="btn-restart">Play Again</button>
          </div>
        </div>
      </div>
      <div id="quickbar">
        <span class="qb-stat"><span class="stat-icon gold">◉</span><b id="qb-gold">0</b></span>
        <span class="qb-stat"><span class="stat-icon lives">❤</span><b id="qb-lives">0</b></span>
        <span class="qb-stat" id="qb-round">1/10</span>
        <button id="qb-start">▶</button>
        <button id="qb-speed">1×</button>
        <button id="qb-auto" title="Autoplay">⟳</button>
      </div>
      <aside id="sidebar">
        <h1>🌿 Wildguard TD</h1>
        <div id="hud">
          <div class="stat"><span class="stat-icon gold">◉</span><span id="hud-gold">0</span></div>
          <div class="stat"><span class="stat-icon lives">❤</span><span id="hud-lives">0</span></div>
          <div class="stat"><span class="stat-icon round">◈</span><span id="hud-round">0</span></div>
        </div>
        <div id="relic-bar"></div>
        <div id="controls">
          <div id="node-picker" class="hidden"></div>
          <button id="btn-start">Start Wave 1</button>
          <div id="speed-row">
            <button class="btn-speed active" data-speed="1">1×</button>
            <button class="btn-speed" data-speed="2">2×</button>
            <button class="btn-speed" data-speed="3">3×</button>
            <label id="autoplay-label"><input type="checkbox" id="chk-auto" /> Auto</label>
          </div>
          <div id="audio-row">
            <button id="btn-mute" title="Mute">🔊</button>
            <button id="btn-music" title="Toggle music">🎵</button>
            <input type="range" id="vol-slider" min="0" max="100" value="50" />
          </div>
        </div>
        <div id="shop"></div>
        <div id="wave-preview"></div>
        <div id="map-row">
          <select id="map-select"></select>
          <button id="btn-newrun" title="Abandon the saved run and start over">🔄</button>
        </div>
      </aside>
    </div>
  </body>
</html>
