<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#120f0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Wildguard TD</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <script type="module" crossorigin src="./assets/main-Blv46VFC.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/mapio-jTVT-Vpn.js">
    <link rel="stylesheet" crossorigin href="./assets/mapio-dUySG5XY.css">
  </head>
  <body>
    <div id="loading">
      <div id="loading-inner">
        <div id="loading-title">🌿 Wildguard TD</div>
        <div id="loading-bar"><div id="loading-fill"></div></div>
        <div id="loading-text">Waking the wilds…</div>
      </div>
    </div>
    <div id="rotate-overlay">
      <div id="ro-card">
        <div id="ro-phone">📱</div>
        <h2>Rotate your device</h2>
        <p>Wildguard TD plays in landscape</p>
      </div>
    </div>
    <div id="app">
      <div id="board-wrap">
        <canvas id="board" width="960" height="640"></canvas>
        <div id="hud">
          <span class="stat"><span class="stat-icon lives">❤</span><span id="hud-lives">0</span></span>
          <span class="stat"><span class="stat-icon gold">◉</span><span id="hud-gold">0</span></span>
          <span class="stat"><span class="stat-icon round">◈</span><span id="hud-round">0</span></span>
          <button id="btn-menu" title="Menu — pauses the game">☰</button>
        </div>
        <div id="tower-panel" class="hidden"></div>
        <div id="draft-modal" class="hidden"></div>
        <div id="specialize-modal" class="hidden"></div>
        <div id="relic-modal" class="hidden"></div>
        <div id="event-modal" class="hidden"></div>
        <div id="path-modal" class="hidden"></div>
        <div id="actclear-modal" class="hidden"></div>
        <div id="grove-modal" class="hidden"></div>
        <div id="menu-modal" class="hidden">
          <div id="menu-card">
            <h2>⏸ Game Paused</h2>
            <div class="menu-label">Sound</div>
            <div id="audio-row">
              <button id="btn-mute" title="Mute everything">🔊</button>
              <input type="range" id="vol-slider" min="0" max="100" value="50" title="Sound effects volume" />
            </div>
            <div id="music-row">
              <button id="btn-music" title="Toggle music">🎵</button>
              <input type="range" id="music-slider" min="0" max="100" value="50" title="Music volume" />
            </div>
            <div class="menu-label">Your Run</div>
            <div id="menu-run"></div>
            <div id="map-row">
              <button id="btn-grove" title="Warden's Grove — spend essence on permanent perks">🌳 Grove</button>
              <button id="btn-newrun" title="Abandon the saved run and start over">🔄 New Run</button>
            </div>
            <button id="btn-resume">▶ Resume</button>
          </div>
        </div>
        <div id="spell-bar" class="hidden"></div>
        <div id="zoom-controls">
          <button id="zoom-in" title="Zoom in">＋</button>
          <button id="zoom-out" title="Zoom out">－</button>
          <button id="zoom-reset" title="Reset view">⛶</button>
        </div>
        <div id="gesture-hint" class="hidden">
          <div id="gh-card">
            <h2>🌿 Welcome, Warden!</h2>
            <div class="gh-row"><span class="gh-icon">🤏</span> Pinch (or use ＋/－) to zoom the battlefield</div>
            <div class="gh-row"><span class="gh-icon">✋</span> Drag with one finger to look around while zoomed</div>
            <div class="gh-row"><span class="gh-icon">👆</span> Double-tap to zoom in and out quickly</div>
            <button id="gh-ok">Got it — to battle! ⚔️</button>
          </div>
        </div>
        <div id="place-confirm" class="hidden">
          <button id="pc-build">✓ Build</button>
          <button id="pc-cancel">✕</button>
        </div>
        <div id="overlay" class="hidden">
          <div id="overlay-card">
            <h2 id="overlay-title"></h2>
            <p id="overlay-text"></p>
            <button id="btn-restart">Play Again</button>
            <button id="btn-grove-over">🌳 Warden's Grove</button>
          </div>
        </div>
      </div>
      <aside id="sidebar">
        <div id="relic-bar"></div>
        <div id="shop"></div>
        <div id="wave-preview"></div>
        <div id="node-picker" class="hidden"></div>
        <div id="speed-row">
          <button class="btn-speed active" data-speed="1">1×</button>
          <button class="btn-speed" data-speed="2">2×</button>
          <button class="btn-speed" data-speed="3">3×</button>
          <label id="autoplay-label"><input type="checkbox" id="chk-auto" /> Auto</label>
        </div>
        <button id="btn-start">Start Wave 1</button>
      </aside>
    </div>
  </body>
</html>
